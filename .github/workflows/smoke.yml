name: Grammarly Smoke Suite

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1-5'

jobs:
  smoke:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci --registry https://registry.npmjs.org


      - name: Ensure Grammarly Desktop is running
        run: |
          if ! pgrep -x "Grammarly Desktop" > /dev/null; then
            open -a 'Grammarly Desktop'
            sleep 15
          else
            echo "Grammarly Desktop already running"
          fi

      - name: Preflight check
        run: npm run preflight

      - name: Run smoke suite
        run: npm run smoke:suite

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
